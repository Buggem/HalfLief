<!doctype HTML>
<html>
  <head>
    <title>HalfTube</title>
	<link rel="shortcut icon" href="/watch/logo.png"/>
    <link rel="stylesheet" href="/watch/index.css"/>
	<script src="index.js"></script>
	<script>
	  window.onload = () => {
		let vthing = window.location.href.split("?v=");
		let body = document.getElementById("body");
		  
		if (vthing.length == 2) {
		  let vidid = vthing[1].split("&")[0];
		  if(vids.hasOwnProperty(vidid)) {
			document.getElementsByTagName("title")[0].innerText = `${vids[vidid].title} - HalfTube`;
			body.children[0].innerText = vids[vidid].title;

			let source = document.createElement("source");
			source.setAttribute("src", vids[vidid].source);
			source.setAttribute("type", "video/mp4");
			body.children[1].appendChild(source);
			
			body.children[2].children[0].innerText = numbrr(vids[vidid].views)    + " views";
			body.children[2].children[1].innerText = numbrr(vids[vidid].votes)    + " votes";
			body.children[2].children[2].innerText = numbrr(vids[vidid].comments) + " comments";
		  }
		} else {
		  body.setAttribute("class", "home");
		  body.innerHTML = `        <h1>Videos for humans</h1><br>
        <p>Sick of AI slop on your FYP?<br>Sick of reels that take control of your subconscious to push you into buying stuff?</p>
        <p>
          Well ladies and gentlemen, this website is for you!
        </p>
        <p>
          <b>HalfTube</b> is a parody of a social-media-esque service continuing upon the legacy of older video sharing sites like LiveLeak.
        </p>
        <p>
          You can't like or leave a comment here. Your views don't effect the numbers. Your "for you" page is totally random. You can't even upload videos without <a href="https://github.com/Buggem/HalfLief/compare">opening a pull request!</a>
        </p>
        <p>
          Everything is a pristine copy of a good old video sharing site, without the AI slop and rubbish you have to put up with today from platforms like YouTube and TikTok.
        </p>`;
		}
	  };
	</script>
  </head>
  <body>
    <div class="header">
      <span><a id="title" href="/watch">Hλlf<span>Tube</span></a></span>
      <span class="option"><a href="/watch">Watch</a></span>
      <span class="last option"><a href="/watch/foryou">For you</a></span>
    </div>
    <div id="body">
      <h1>Video title</h1>
      <video controls style="height: 480px;" height=480>
      </video>
      <p>
        <span class="option">0 views</span>
        <span class="option">0 votes</span>
        <span class="last option">0 comments</span>
      </p>
    </div>

  </body>
</html>
