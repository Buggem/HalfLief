<!doctype HTML>
<html>
  <head>
    <title>HalfTube</title>
	<link rel="shortcut icon" href="/watch/logo.png"/>
    <style>
      html {
        font-family: arial;
      }
      .header {
        position: fixed;
        left: 0;
        top:  0;
        width: 100%;
        padding: 10px;
        
        background: grey;
        color: white;
        
      }
      #title {
        padding: 0 5px;
        border-radius: 5px;

        font-size: 30px;
		font-weight: 600;

        color: darkorange;
        text-decoration: none;
        
        background: white;
      }
      #title:active {
        color: darkred;
      }
      #title > span {
        font-weight: 300;
        color: black;
      }
      #title:active > span {
        font-weight: 300;
        color: #333333;
      }
      .option {
        --dotpoint: 5px;
		vertical-align: center;
        
        margin: 0 var(--dotpoint);
      }
      .option > a {
        color: lightgray;
        text-decoration: none;
      }
      .option:not(.last)::after {
        position: relative;
        left: var(--dotpoint);
        content: "•";
      }
      #body {
        position: relative;
        top: 60px;
        left: 20px;
      }
    </style>
	<script>
	  window.vids = {
		  "sMtckj6gnbg": {
			  "title":  "Are these the world's cripiest fries? Let's find out.",
			  "source": "/watch/fries_hd.mp4"
		  }
	  };
	  window.onload = () => {
		let vthing = window.location.href.split("?v=");
		if (vthing.length == 2) {
		  let vidid = vthing[1].split("&")[0];
		  if(vids.hasOwnProperty(vidid)) {
			let body = document.getElementById("body");
			body.children[0].innerText = vids[vidid].title;

			let source = document.createElement("source");
			source.setAttribute("src", vids[vidid].source);
			source.setAttribute("type", "video/mp4");
			body.children[1].appendChild(source);
			
			body.children[2].children[0].innerText = "654k views";
			body.children[2].children[1].innerText = "31k votes";
			body.children[2].children[2].innerText = "324 comments";
		  }
		}
	  };
	</script>
  </head>
  <body>
    <div class="header">
      <span><a id="title" href="/watch">Hλlf<span>Tube</span></a></span>
      <span class="option"><a href="/watch">Watch</a></span>
      <span class="option"><a href="/watch/foryou">For you</a></span>
      <span class="last option"><a href="/watch/foryou">Dank meme</a></span>
    </div>
    <div id="body">
      <h1>Video title</h1>
      <video controls style="width: calc(256px*(16/9)); height: 256px;">
      </video>
      <p>
        <span class="option">0 views</span>
        <span class="option">0 votes</span>
        <span class="last option">0 comments</span>
      </p>
    </div>

  </body>
</html>
